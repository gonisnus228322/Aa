<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM CRITICAL</title>
    
    <meta property="og:title" content="⚠️ SYSTEM ALERT" />
    <meta property="og:image" content="https://i.imgur.com/XpcKhtR.png" />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="https://i.imgur.com/XpcKhtR.png">

    <style>
        body {
            background-color: #000000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            transition: background-color 0.1s ease;
        }

        /* Flash effect when clicked */
        .flash-red {
            background-color: #ff0000 !important;
            color: #ffffff !important;
        }

        .terminal {
            max-width: 800px;
            margin: 80px auto 0 auto;
            border: 1px solid #00ff00;
            padding: 20px;
            background-color: #050505;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            position: relative;
            z-index: 1; /* Keeps terminal behind the invisible blanket initially */
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            text-transform: uppercase;
            margin-top: 0;
        }

        .log-line {
            margin: 10px 0;
            font-size: 1.1rem;
            white-space: nowrap;
            overflow: hidden;
        }

        .danger {
            color: #ff0000;
            font-weight: bold;
        }

        /* The Invisible Blanket covering the entire screen */
        #click-blanket {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999; /* Sits on top of absolutely everything */
            background: transparent;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="click-blanket"></div>

    <div class="terminal" id="term-box">
        <h1 id="status-title">> SYSTEM STATUS: SECURE <</h1>
        <hr style="border-color: #00ff00;" id="terminal-hr">
        
        <div class="log-line">> Integrity Check: PASS</div>
        <div class="log-line">> Firewall Status: ACTIVE</div>
        
        <div class="log-line">> Target IP: <span id="user-ip">Fetching...</span></div>
        <div class="log-line">> Operating System: <span id="user-os">Detecting...</span></div>
        <div class="log-line">> Browser Engine: <span id="user-browser">Detecting...</span></div>
        
        <div id="dynamic-zone" style="margin-top: 20px;">
            <div class="log-line" style="color: #666; text-align: center; animation: blink 1.5s infinite;">
                [ CLICK ANYWHERE ON TERMINAL TO SYNC REPOSITORY ]
            </div>
        </div>
    </div>

    <script>
        const blanket = document.getElementById('click-blanket');
        const bodyElement = document.body;
        const termBox = document.getElementById('term-box');
        const statusTitle = document.getElementById('status-title');
        const terminalHr = document.getElementById('terminal-hr');
        const dynamicZone = document.getElementById('dynamic-zone');

        // --- PART 1: SILENTLY FETCH VISITOR INFO ON LOAD ---
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('user-ip').textContent = data.ip;
            })
            .catch(() => {
                document.getElementById('user-ip').textContent = "192.168.1.1 (Proxy)";
            });

        const info = navigator.userAgent;
        if (info.includes("Windows")) document.getElementById('user-os').textContent = "Windows OS";
        else if (info.includes("Macintosh")) document.getElementById('user-os').textContent = "macOS Context";
        else if (info.includes("Android")) document.getElementById('user-os').textContent = "Android Mobile";
        else if (info.includes("Linux")) document.getElementById('user-os').textContent = "Linux Kernel";
        else document.getElementById('user-os').textContent = "External Architecture";

        if (info.includes("Chrome")) document.getElementById('user-browser').textContent = "Google Chrome Engine";
        else if (info.includes("Firefox")) document.getElementById('user-browser').textContent = "Mozilla Firefox";
        else if (info.includes("Safari")) document.getElementById('user-browser').textContent = "Apple Safari Context";
        else document.getElementById('user-browser').textContent = "Standard Web Agent";


        // --- PART 2: THE SCARE INTERACTION (CLICK ANYWHERE) ---
        blanket.addEventListener('click', () => {
            
            // 1. Instantly trigger full screen to trap their mouse/view
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.webkitRequestFullscreen) { /* Safari */
                document.documentElement.webkitRequestFullscreen();
            }

            // Remove the invisible blanket so it doesn't block future scrolling/actions
            blanket.style.display = 'none';

            // 2. Flash screen red violently
            bodyElement.classList.add('flash-red');
            setTimeout(() => {
                bodyElement.classList.remove('flash-red');
            }, 150);

            // 3. Transform the terminal to look compromised
            statusTitle.textContent = "⚠️ SYSTEM COMPROMISED ⚠️";
            statusTitle.className = "danger";
            termBox.style.borderColor = "#ff0000";
            termBox.style.boxShadow = "0 0 25px rgba(255, 0, 0, 0.6)";
            terminalHr.style.borderColor = "#ff0000";
            document.getElementById('user-ip').className = "danger";

            // 4. Inject the deletion scripts
            dynamicZone.innerHTML = `
                <div class="log-line danger">> OVERRIDING EXTERNAL SECURITY KERNEL... SUCCESS</div>
                <div class="log-line danger">> DOWNLOADING REPOSITORY LOCAL ARCHIVES... CONNECTED</div>
                <div class="log-line" style="color: #ff0000;" id="countdown">[ WIPING SYSTEM VOLUMES: 0% ]</div>
            `;

            // 5. Run the ticking count up sequence
            let progress = 0;
            const liveCounter = setInterval(() => {
                progress += 1;
                document.getElementById('countdown').textContent = `[ WIPING SYSTEM VOLUMES: ${progress}% ]`;
                
                // Add staggered lines during deletion to look realistic
                if (progress === 20) {
                    const l = document.createElement('div'); l.className = "log-line danger";
                    l.textContent = "> Corrupting Master Boot Record (MBR)...";
                    dynamicZone.appendChild(l);
                }
                if (progress === 45) {
                    const l = document.createElement('div'); l.className = "log-line danger";
                    l.textContent = "> Dumping system hardware registers...";
                    dynamicZone.appendChild(l);
                }
                if (progress === 75) {
                    const l = document.createElement('div'); l.className = "log-line danger";
                    l.textContent = "> Broadcasting local network tokens...";
                    dynamicZone.appendChild(l);
                }

                if (progress >= 100) {
                    clearInterval(liveCounter);
                    document.getElementById('countdown').textContent = "[ TERMINAL DESTROYED. MEMORY FLUSHED ]";
                    bodyElement.style.backgroundColor = "#000000";
                    termBox.style.display = 'none';
                }
            }, 65); // Completes the full sequence in about 6.5 seconds
        });
    </script>

</body>
</html>
