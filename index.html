<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM CRITICAL</title>
    
    <meta property="og:title" content="⚠️ SYSTEM ALERT" />
    <meta property="og:image" content="https://i.imgur.com/XpcKhtR.png" />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="https://i.imgur.com/XpcKhtR.png">

    <style>
        body {
            background-color: #000000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            transition: background-color 0.1s ease;
        }

        .flash-red {
            background-color: #ff0000 !important;
            color: #ffffff !important;
        }

        .terminal {
            max-width: 800px;
            margin: 80px auto 0 auto;
            border: 1px solid #00ff00;
            padding: 20px;
            background-color: #050505;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        :fullscreen .terminal {
            max-width: 100%;
            margin: 0;
            height: 100vh;
            border: none;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        :fullscreen .log-line {
            font-size: 1.8rem;
            margin: 15px 0;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            text-transform: uppercase;
            margin-top: 0;
        }

        .log-line {
            margin: 10px 0;
            font-size: 1.1rem;
            white-space: nowrap;
            overflow: hidden;
        }

        .danger {
            color: #ff0000;
            font-weight: bold;
        }

        #click-blanket {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background: transparent;
            cursor: pointer;
        }

        /* --- MODERN WINDOWS 11 WINDOW ARCHITECTURE --- */
        .win11-window {
            position: fixed;
            width: 420px;
            background-color: #f3f3f3;
            border: 1px solid #d0d0d0;
            border-radius: 8px;
            color: #000000;
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            box-shadow: 0px 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 5000;
            overflow: hidden;
            user-select: none;
            
            /* Windows 11 Native Opening Animation Spark */
            animation: win11Open 0.25s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
            opacity: 0;
        }

        /* The custom physics scale-up pathing matching Fluent OS curves */
        @keyframes win11Open {
            0% {
                transform: scale(0.85);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .win11-header {
            background-color: #ffffff;
            height: 32px;
            padding: 0 0 0 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #202020;
            border-bottom: 1px solid #e5e5e5;
        }

        .win11-controls {
            display: flex;
            height: 100%;
        }

        .win11-btn {
            width: 46px;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
        }
        .win11-btn.close-btn:hover {
            background-color: #e81123;
            color: #ffffff;
        }

        .win11-body {
            padding: 20px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .win11-icon {
            font-size: 28px;
            color: #cc0000;
        }

        .win11-text h2 {
            margin: 0 0 6px 0;
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .win11-text p {
            margin: 0;
            font-size: 12.5px;
            color: #505050;
            line-height: 1.4;
        }

        .win11-footer {
            padding: 10px 20px;
            background-color: #eeeeee;
            display: flex;
            justify-content: flex-end;
            border-top: 1px solid #e0e0e0;
        }

        .win11-action-btn {
            padding: 4px 18px;
            background-color: #ffffff;
            border: 1px solid #cccccc;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="click-blanket"></div>

    <div id="window-factory"></div>

    <div class="terminal" id="term-box">
        <h1 id="status-title">> SYSTEM STATUS: SECURE <</h1>
        <hr style="border-color: #00ff00;" id="terminal-hr">
        
        <div class="log-line">> Integrity Check: PASS</div>
        <div class="log-line">> Firewall Status: ACTIVE</div>
        
        <div class="log-line">> Target IP: <span id="user-ip">Fetching...</span></div>
        <div class="log-line">> Operating System: <span id="user-os">Detecting...</span></div>
        <div class="log-line">> Browser Engine: <span id="user-browser">Detecting...</span></div>
        
        <div id="dynamic-zone" style="margin-top: 20px;">
            <div class="log-line" style="color: #666; text-align: center;">
                [ CLICK ANYWHERE ON TERMINAL TO SYNC REPOSITORY ]
            </div>
        </div>
    </div>

    <script>
        const blanket = document.getElementById('click-blanket');
        const bodyElement = document.body;
        const termBox = document.getElementById('term-box');
        const statusTitle = document.getElementById('status-title');
        const terminalHr = document.getElementById('terminal-hr');
        const dynamicZone = document.getElementById('dynamic-zone');
        const factory = document.getElementById('window-factory');

        // Fetch user data metrics
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('user-ip').textContent = data.ip;
            })
            .catch(() => {
                document.getElementById('user-ip').textContent = "192.168.1.1 (Proxy)";
            });

        const info = navigator.userAgent;
        if (info.includes("Windows")) document.getElementById('user-os').textContent = "Windows OS";
        else if (info.includes("Macintosh")) document.getElementById('user-os').textContent = "macOS Platform";
        else if (info.includes("Android")) document.getElementById('user-os').textContent = "Android Device";
        else if (info.includes("Linux")) document.getElementById('user-os').textContent = "Linux Kernel";
        else document.getElementById('user-os').textContent = "External Matrix";

        if (info.includes("Chrome")) document.getElementById('user-browser').textContent = "Google Chrome / Chromium";
        else if (info.includes("Firefox")) document.getElementById('user-browser').textContent = "Mozilla Firefox";
        else if (info.includes("Safari")) document.getElementById('user-browser').textContent = "Apple Safari Agent";
        else document.getElementById('user-browser').textContent = "Webkit Context";

        const errorTemplates = [
            { title: "Windows Security", heading: "Threat containment failure", msg: "An unhandled background process has requested immediate memory reallocation." },
            { title: "System Kernel Alert", heading: "Bypass Block Detected", msg: "External repository data injection detected on sector 0x000F8A32." },
            { title: "Microsoft Account", heading: "Credential extraction warning", msg: "Local browser database tokens are sync-transferring to an unauthorized proxy domain." },
            { title: "BitLocker Drive Encryption", heading: "Encryption initialization", msg: "Security keys are being rewritten. System files will lock automatically on reboot." },
            { title: "Critical System Process", heading: "lsass.exe - Terminated", msg: "The system will now force memory cache flushes. Hardware volumes unreadable." }
        ];

        let physicsLoops = [];

        // Engine that drops windows on screen with unique animation scales and audio beats
        function spawnWindow(data, index) {
            // Play error sound cleanly on launch using your specific filename
            const audio = new Audio('windows-11-error-sound.mp3');
            audio.volume = 0.8;
            audio.play().catch(e => console.log("Audio play blocked until interaction."));

            const win = document.createElement('div');
            win.className = 'win11-window';
            
            let posX = (window.innerWidth / 2 - 210) + (index * 40) - 80;
            let posY = (window.innerHeight / 2 - 100) + (index * 30) - 60;
            win.style.left = posX + 'px';
            win.style.top = posY + 'px';

            win.innerHTML = `
                <div class="win11-header">
                    <span>${data.title}</span>
                    <div class="win11-controls"><div class="win11-btn close-btn">✕</div></div>
                </div>
                <div class="win11-body">
                    <div class="win11-icon">⚠️</div>
                    <div class="win11-text">
                        <h2>${data.heading}</h2>
                        <p>${data.msg}</p>
                    </div>
                </div>
                <div class="win11-footer"><button class="win11-action-btn">OK</button></div>
            `;

            factory.appendChild(win);

            let dx = (index % 2 === 0 ? 4 : -4) + (index * 0.4);
            let dy = (index % 3 === 0 ? 3 : -3) - (index * 0.4);

            // Bouncing logic runs perfectly alongside animation scaling
            const interval = setInterval(() => {
                posX += dx;
                posY += dy;

                if (posX + 420 >= window.innerWidth || posX <= 0) dx = -dx;
                if (posY + 160 >= window.innerHeight || posY <= 0) dy = -dy;

                win.style.left = posX + 'px';
                win.style.top = posY + 'px';
            }, 16);

            physicsLoops.push(interval);
        }

        // --- TRIGGER SECTOR ---
        blanket.addEventListener('click', () => {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }

            blanket.style.display = 'none';

            bodyElement.classList.add('flash-red');
            setTimeout(() => {
                bodyElement.classList.remove('flash-red');
            }, 120);

            statusTitle.textContent = "⚠️ HARDWARE THREAT DETECTED ⚠️";
            statusTitle.className = "danger";
            termBox.style.borderColor = "#ff0000";
            termBox.style.boxShadow = "0 0 30px rgba(255, 0, 0, 0.6)";
            terminalHr.style.borderColor = "#ff0000";
            document.getElementById('user-ip').className = "danger";

            dynamicZone.innerHTML = `
                <div class="log-line danger">> CORRUPTING HOST DIRECTORY MEMORY SECTORS...</div>
                <div class="log-line" style="color: #ff0000;" id="countdown">[ PURGING VOLUMES: 0% ]</div>
            `;

            let progress = 0;

            // Ticking speed is slowed down to give the windows more screen-time before blacking out
            const liveCounter = setInterval(() => {
                progress += 1;
                document.getElementById('countdown').textContent = `[ PURGING VOLUMES: ${progress}% ]`;
                
                // Stagger out the animated sound windows across the timeline
                if (progress === 8) spawnWindow(errorTemplates[0], 0);
                if (progress === 18) spawnWindow(errorTemplates[1], 1);
                if (progress === 28) spawnWindow(errorTemplates[2], 2);
                if (progress === 38) spawnWindow(errorTemplates[3], 3);
                if (progress === 48) spawnWindow(errorTemplates[4], 4);

                if (progress === 30) {
                    const l = document.createElement('div'); l.className = "log-line danger";
                    l.textContent = "> Overriding kernel protection schemas...";
                    dynamicZone.appendChild(l);
                }
                if (progress === 65) {
                    const l = document.createElement('div'); l.className = "log-line danger";
                    l.textContent = "> Transferring captured browser hashes...";
                    dynamicZone.appendChild(l);
                }

                if (progress >= 100) {
                    clearInterval(liveCounter);
                    physicsLoops.forEach(loop => clearInterval(loop));
                    
                    document.getElementById('countdown').textContent = "[ MEMORY STRIPPED. STORAGE UNREADABLE ]";
                    bodyElement.style.backgroundColor = "#000000";
                    termBox.style.display = 'none';
                    factory.innerHTML = ''; 
                }
            }, 180); 
        });
    </script>

</body>
</html>
